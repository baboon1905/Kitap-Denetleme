name: Manual Integration Tests

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  provider-and-live-api:
    runs-on: ubuntu-latest
    environment: integration

    defaults:
      run:
        working-directory: kitap-degerlendirme-app

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUTF8: "1"
      FLASK_ENV: testing
      FLASK_PORT: "5000"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: kitap-degerlendirme-app/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate integration secrets
        shell: bash
        run: |
          test -n "$OPENAI_API_KEY"
          test -n "$GROQ_API_KEY"

      - name: Check model providers
        run: |
          python test_chat.py
          python test_groq.py

      - name: Start Flask application
        shell: bash
        run: |
          python app.py > flask-integration.log 2>&1 &
          echo $! > flask.pid
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:5000/health; then
              exit 0
            fi
            sleep 2
          done
          cat flask-integration.log
          exit 1

      - name: Run live API smoke checks
        run: python test_quick_api.py

      - name: Upload Flask integration log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flask-integration-log
          path: kitap-degerlendirme-app/flask-integration.log
          if-no-files-found: ignore
