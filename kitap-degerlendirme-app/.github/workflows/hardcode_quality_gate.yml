name: Hardcode Quality Gate

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  hardcode_quality_gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run hardcode scanner
        id: hardcode_scan
        run: |
          python tools/check_hardcode.py . || true
          python - <<'PY'
import json, os, re
path = os.path.join(os.getcwd(), 'tools', 'hardcode_report.json')
with open(path, 'r', encoding='utf-8') as f:
    data = json.load(f)
patterns = [
    re.compile(r'^analyze_.*\\.py$', re.IGNORECASE),
    re.compile(r'^check_.*\\.py$', re.IGNORECASE),
    re.compile(r'^app_py_.*\\.py$', re.IGNORECASE),
    re.compile(r'^ast_check_.*\\.py$', re.IGNORECASE),
    re.compile(r'^apply_.*fix.*\\.py$', re.IGNORECASE),
    re.compile(r'^debug_.*\\.py$', re.IGNORECASE),
    re.compile(r'^run_.*verification.*\\.py$', re.IGNORECASE),
    re.compile(r'^.*_summary\\.py$', re.IGNORECASE),
    re.compile(r'^.*_findings\\.py$', re.IGNORECASE),
]

def is_dev_tool(filename):
    name = os.path.basename(filename)
    return any(pat.match(name) for pat in patterns)

def is_test_benchmark(filename):
    name = os.path.basename(filename).lower()
    return name.startswith('test_') or name.endswith('_test.py') or 'benchmark' in name or 'bench' in name

runtime = []
devtool = []
testbench = []
for r in data['findings']:
    file = r['file']
    if r['severity'] not in ('CRITICAL', 'HIGH'):
        continue
    if is_dev_tool(file):
        devtool.append(r)
    elif is_test_benchmark(file):
        testbench.append(r)
    else:
        runtime.append(r)

metrics = {
    'runtime_production_blocking': len(runtime),
    'dev_tool_blocking': len(devtool),
    'test_benchmark_blocking': len(testbench),
    'total_blocking': len(runtime),
    'medium_count': data.get('summary', {}).get('MEDIUM', 0),
    'low_count': data.get('summary', {}).get('LOW', 0),
    'ci_status': 'pass' if len(runtime) == 0 else 'fail',
}
with open('tools/hardcode_ci_metrics.json', 'w', encoding='utf-8') as out:
    json.dump(metrics, out, ensure_ascii=False, indent=2)
print('runtime_production_blocking=', metrics['runtime_production_blocking'])
print('dev_tool_blocking=', metrics['dev_tool_blocking'])
print('test_benchmark_blocking=', metrics['test_benchmark_blocking'])
print('hardcode_report=tools/hardcode_report.json')
print('hardcode_ci_metrics=tools/hardcode_ci_metrics.json')
PY
        env:
          PYTHONUTF8: 1

      - name: Upload hardcode reports
        uses: actions/upload-artifact@v4
        with:
          name: hardcode-reports
          path: |
            tools/hardcode_report.json
            tools/hardcode_ci_metrics.json

      - name: Fail on runtime production CRITICAL/HIGH
        if: steps.hardcode_scan.outcome == 'success' || always()
        run: |
          python - <<'PY'
import json, os
path = os.path.join(os.getcwd(), 'tools', 'hardcode_ci_metrics.json')
with open(path, 'r', encoding='utf-8') as f:
    data = json.load(f)
if data['runtime_production_blocking'] > 0:
    raise SystemExit(f"CI failed: runtime production CRITICAL/HIGH = {data['runtime_production_blocking']}")
print('Runtime production CRITICAL/HIGH =', data['runtime_production_blocking'])
print('Dev/tool CRITICAL/HIGH =', data['dev_tool_blocking'])
print('Test/benchmark CRITICAL/HIGH =', data['test_benchmark_blocking'])
print('CI status =', data.get('ci_status'))
PY

      - name: Smoke test compile
        run: |
          python -m py_compile app.py
          python -m py_compile theme_gain_analysis.py
          python -m py_compile evaluator_maarif.py
          python -m py_compile report_generator.py
